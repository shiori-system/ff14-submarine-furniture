<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FF14 潜水艦 家具・調度品 逆引きマケボ価格</title>
<style>
:root {
  --bg:#fdf8f0;
  --bg2:#f5ede0;
  --border:#d4c4a8;
  --gold:#c89830;
  --gold2:#9c6e14;
  --text:#2c2010;
  --text2:#7a6040;
  --green:#1a6a1a;
  --blue:#14508a;
  --rowGroup:#fffaf0;
  --rowAlt:#fbf3e5;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Yu Gothic UI','Meiryo UI','Segoe UI',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
}
header{
  background:linear-gradient(135deg,#3a2808,#5a3c10 50%,#3a2808);
  border-bottom:3px solid var(--gold);
  padding:14px 24px;
}
header h1{
  font-size:20px;
  color:#f0d890;
  letter-spacing:.06em;
}
header .sub{
  color:#c0a860;
  font-size:12px;
  margin-top:3px;
}
.controls{
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  padding:10px 20px;
}
.control-row{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  align-items:center;
  margin:6px 0;
}
.control-label{
  width:82px;
  font-size:12px;
  color:var(--text2);
  font-weight:bold;
}
.search-box{
  background:#fff;
  border:1px solid var(--border);
  border-radius:6px;
  padding:6px 12px;
  color:var(--text);
  font-size:14px;
  width:260px;
  outline:none;
  transition:border-color .2s;
}
.search-box:focus{border-color:var(--gold2);}
.filter-group{display:flex;gap:5px;flex-wrap:wrap;}
.filter-btn{
  background:#fff;
  border:1px solid var(--border);
  border-radius:4px;
  padding:4px 10px;
  color:var(--text2);
  font-size:12px;
  cursor:pointer;
  transition:all .15s;
}
.filter-btn:hover{border-color:var(--gold2);color:var(--gold2);}
.filter-btn.active{
  background:var(--gold2);
  border-color:var(--gold2);
  color:#fff;
  font-weight:bold;
}
.server-info{
  margin-left:auto;
  display:flex;
  align-items:center;
  gap:8px;
  font-size:12px;
  color:var(--text2);
}
.server-badge{
  background:#e8f0fc;
  border:1px solid #7090d0;
  color:var(--blue);
  padding:2px 8px;
  border-radius:4px;
}
#refresh-btn{
  background:#fff;
  border:1px solid var(--gold2);
  color:var(--gold2);
  padding:4px 12px;
  border-radius:4px;
  cursor:pointer;
  font-size:12px;
}
#refresh-btn:hover{background:var(--gold2);color:#fff;}
#refresh-btn:disabled{opacity:.5;cursor:not-allowed;}
.table-wrap{overflow-x:auto;padding:12px 20px 20px;}
table{width:100%;border-collapse:collapse;font-size:14px;background:#fff;}
th{
  background:#3a2808;
  color:#f0d890;
  padding:9px 12px;
  text-align:left;
  border-bottom:2px solid var(--gold);
  white-space:nowrap;
  cursor:pointer;
  user-select:none;
  position:sticky;
  top:0;
  z-index:2;
}
th:hover{background:#4a3410;}
th .si{margin-left:4px;color:#c0a060;font-size:11px;}
td{
  padding:8px 12px;
  border-bottom:1px solid var(--border);
  vertical-align:middle;
}
tr.route-row td{background:#fff;}
tr.route-row.alt td{background:var(--rowAlt);}
tr.group-start td{
  border-top:2px solid #d2b16a;
  background:var(--rowGroup);
}
tr.route-row:hover td,
tr.group-start:hover td{
  background:rgba(200,152,48,.15);
}
.same{
  color:#b6a68c;
  font-size:12px;
  text-align:center;
}
.route-cell{
  display:flex;
  align-items:center;
  gap:6px;
}
.route-mark{
  color:#b08428;
  font-weight:bold;
}
a.eorzeadb_link.item-link-lode{
  color:var(--gold2);
  font-weight:700;
  text-decoration:none;
  border-bottom:1px solid var(--gold);
}
a.eorzeadb_link.item-link-lode:hover{color:#7a3800;}
.item-no-lod{
  color:#a06020;
  font-weight:700;
}
.cat-badge{
  display:inline-block;
  padding:2px 7px;
  border-radius:3px;
  font-size:11px;
  white-space:nowrap;
}
.c調度品{background:#e8f5e8;color:#1a6a1a;border:1px solid #a8d8a8;}
.c卓上{background:#e4f4f8;color:#0c6080;border:1px solid #90d0e0;}
.c壁掛{background:#f4e8f8;color:#7020a0;border:1px solid #d090e0;}
.c庭具{background:#fdf0d8;color:#804010;border:1px solid #e0b870;}
.sea-badge{
  display:inline-block;
  padding:2px 7px;
  border-radius:3px;
  font-size:11px;
  background:#f0e8d8;
  color:var(--text2);
  border:1px solid #d0b890;
  white-space:nowrap;
}
.rank-col{color:var(--text2);font-size:12px;white-space:nowrap;}
.price-cell{text-align:right;min-width:120px;white-space:nowrap;}
.p-load{color:#a09080;font-size:12px;}
.p-val{color:var(--green);font-weight:bold;font-size:15px;}
.p-none{color:#a09080;font-size:12px;}
.p-g{color:#808060;font-size:11px;margin-left:1px;}
.status-bar{
  padding:5px 20px;
  font-size:12px;
  color:var(--text2);
  border-top:1px solid var(--border);
  display:flex;
  gap:16px;
}
.no-results{
  text-align:center;
  padding:40px;
  color:var(--text2);
  font-size:14px;
}
#ov{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(30,20,5,.55);
  z-index:998;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  gap:10px;
}
#ov.show{display:flex;}
.spinner{
  width:40px;
  height:40px;
  border:3px solid #d0b870;
  border-top-color:transparent;
  border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.ov-text{color:#f0d060;font-size:14px;}
@media (max-width: 760px){
 .table-wrap{
    overflow-x:visible;
    padding:10px;
  }

  table,
  thead,
  tbody,
  th,
  td,
  tr{
    display:block;
  }

  thead{
    display:none;
  }

  tr{
    margin-bottom:12px;
    border:1px solid #d4c4a8;
    border-radius:8px;
    background:#fff;
    padding:10px;
  }

  td{
    border:none;
    padding:4px 0;
  }

  td::before{
    font-weight:bold;
    color:#7a6040;
    display:inline-block;
    width:90px;
  }

  td:nth-child(1)::before{content:"カテゴリ";}
  td:nth-child(2)::before{content:"家具";}
  td:nth-child(3)::before{content:"海域";}
  td:nth-child(4)::before{content:"航路";}
  td:nth-child(5)::before{content:"探査";}
  td:nth-child(6)::before{content:"Rank";}
  td:nth-child(7)::before{content:"価格";}

  .price-cell{
    text-align:left;
  }

  .same{
    display:none;
  }
}
}
</style>
</head>
<body>
<div id="ov"><div class="spinner"></div><div class="ov-text" id="ov-text">データを読み込み中...</div></div>

<header>
  <h1>⚓ FF14 潜水艦 家具・調度品 逆引きマケボ価格</h1>
  <div class="sub">家具名にマウスオーバー → 公式Lodestoneツールチップ ／ Alexander鯖 リアルタイム価格（Universalis）</div>
</header>

<div class="controls">
  <div class="control-row">
    <div class="control-label">検索</div>
    <input type="text" class="search-box" id="search" placeholder="🔍 家具名・航路名で検索...">
    <div class="server-info">
      <span class="server-badge">Alexander / Gaia</span>
      <span id="upd"></span>
      <button id="refresh-btn" onclick="fetchPrices()">🔄 価格更新</button>
    </div>
  </div>

  <div class="control-row">
    <div class="control-label">入手海域</div>
    <div class="filter-group" id="sf">
      <button class="filter-btn active" data-sea="all">全海域</button>
      <button class="filter-btn" data-sea="灰海">灰海</button>
      <button class="filter-btn" data-sea="翠浪海">翠浪海</button>
      <button class="filter-btn" data-sea="セイレーン海">セイレーン海</button>
      <button class="filter-btn" data-sea="紫礁海">紫礁海</button>
      <button class="filter-btn" data-sea="南蒼茫洋">南蒼茫洋</button>
      <button class="filter-btn" data-sea="北洋">北洋</button>
    </div>
  </div>

  <div class="control-row">
    <div class="control-label">カテゴリー</div>
    <div class="filter-group" id="cf">
      <button class="filter-btn active" data-cat="all">すべて</button>
      <button class="filter-btn" data-cat="調度品">調度品</button>
      <button class="filter-btn" data-cat="卓上調度品">卓上</button>
      <button class="filter-btn" data-cat="調度品(壁掛)">壁掛</button>
      <button class="filter-btn" data-cat="庭具">庭具</button>
    </div>
  </div>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th data-col="category">カテゴリー <span class="si">↕</span></th>
        <th data-col="name">家具名 <span class="si">↕</span></th>
        <th data-col="sea">入手海域 <span class="si">↕</span></th>
        <th data-col="zone">航路 <span class="si">↕</span></th>
        <th data-col="exp">探査 <span class="si">↕</span></th>
        <th data-col="rank">ランク <span class="si">↕</span></th>
        <th data-col="price" class="price-cell">マケボ最安値 <span class="si">↓</span></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div class="no-results" id="nores" style="display:none">該当する家具が見つかりません</div>
</div>

<div class="status-bar">
  <div>表示: <span id="cnt">-</span> 行</div>
  <div>家具: <span id="itemcnt">-</span> 件</div>
  <div id="pstat"></div>
</div>

<script>
let ITEMS = [];
let prices = {};
let sortCol = "price";
let sortDir = "desc";
let filterSea = "all";
let filterCat = "all";
let searchText = "";

function lodestoneUrl(item){
  if(!item.lod) return null;
  return `https://jp.finalfantasyxiv.com/lodestone/playguide/db/item/${item.lod}/`;
}

function catClass(c){
  if(c === "卓上調度品") return "c卓上";
  if(String(c).includes("壁掛")) return "c壁掛";
  if(c === "庭具") return "c庭具";
  return "c調度品";
}

function priceHtml(id){
  const p = prices[id];
  if(p === undefined) return `<span class="p-load">読込中...</span>`;
  if(p === null) return `<span class="p-none">出品なし</span>`;
  return `<span class="p-val">${p.toLocaleString("ja-JP")}</span><span class="p-g">G</span>`;
}

function nameHtml(item){
  const url = lodestoneUrl(item);
  if(url){
    return `<a href="${url}" class="eorzeadb_link item-link-lode" target="_blank" rel="noopener">${item.name}</a>`;
  }
  return `<span class="item-no-lod" title="lod未設定">${item.name}</span>`;
}

/* ---------- JSON読み込み ---------- */
async function loadData(){
  const res = await fetch("items.json", { cache: "no-store" });
  if(!res.ok) throw new Error("items.json HTTP " + res.status);
  const json = await res.json();
  ITEMS = json.items || [];
}

/* ---------- Universalis ---------- */
async function fetchPrices(){
  const btn = document.getElementById("refresh-btn");
  btn.disabled = true;
  btn.textContent = "取得中...";
  document.getElementById("ov").classList.add("show");
  document.getElementById("ov-text").textContent = "マケボ価格を取得中...";
  document.getElementById("pstat").textContent = "取得中...";

  const ids = [...new Set(ITEMS.map(i => i.id))].join(",");
  try{
    const res = await fetch(`https://universalis.app/api/v2/Alexander/${ids}?listings=1&entries=0`);
    if(!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();

    prices = {};
    for(const [sid, info] of Object.entries(data.items ?? {})){
      prices[+sid] = (info.minPrice > 0) ? info.minPrice : null;
    }

    const got = Object.values(prices).filter(v => v !== null).length;
    document.getElementById("upd").textContent = `更新: ${new Date().toLocaleTimeString("ja-JP")}`;
    document.getElementById("pstat").textContent = `取得完了 — 出品あり ${got} 件`;
  }catch(e){
    document.getElementById("pstat").textContent = "価格取得エラー: " + e.message;
    console.error(e);
  }

  document.getElementById("ov").classList.remove("show");
  btn.disabled = false;
  btn.textContent = "🔄 価格更新";
  render();
}

/* ---------- 行データ作成 ---------- */
function makeRows(){
  const rows = [];

  for(const item of ITEMS){
    if(filterCat !== "all" && item.cat !== filterCat) continue;

    for(const r of item.routes || []){
      if(filterSea !== "all" && r.sea !== filterSea) continue;

      const textTarget = `${item.name} ${item.cat} ${r.sea} ${r.zone}`;
      if(searchText && !textTarget.includes(searchText)) continue;

      rows.push({
        item,
        route: r,
        category: item.cat,
        name: item.name,
        sea: r.sea,
        zone: r.zone,
        exp: Number(r.exp ?? 0),
        rank: Number(r.rank ?? 0),
        price: prices[item.id] ?? -1
      });
    }
  }

  rows.sort((a,b) => {
    let va, vb;

    if(sortCol === "category"){ va = a.category; vb = b.category; }
    else if(sortCol === "name"){ va = a.name; vb = b.name; }
    else if(sortCol === "sea"){ va = a.sea; vb = b.sea; }
    else if(sortCol === "zone"){ va = a.zone; vb = b.zone; }
    else if(sortCol === "exp"){ va = a.exp; vb = b.exp; }
    else if(sortCol === "rank"){ va = a.rank; vb = b.rank; }
    else if(sortCol === "price"){ va = a.price; vb = b.price; }
    else { va = a.name; vb = b.name; }

    if(typeof va === "string"){
      const cmp = va.localeCompare(vb, "ja");
      if(cmp !== 0) return cmp * (sortDir === "asc" ? 1 : -1);
    }else{
      if(va !== vb) return (va - vb) * (sortDir === "asc" ? 1 : -1);
    }

    // 同じ場合は家具名→海域→航路で安定ソート
    const n = a.name.localeCompare(b.name, "ja");
    if(n !== 0) return n;
    const s = a.sea.localeCompare(b.sea, "ja");
    if(s !== 0) return s;
    return a.zone.localeCompare(b.zone, "ja");
  });

  return rows;
}

/* ---------- 描画 ---------- */
function render(){
  const rows = makeRows();
  const tbody = document.getElementById("tbody");
  const nores = document.getElementById("nores");

  nores.style.display = rows.length ? "none" : "";
  document.getElementById("cnt").textContent = rows.length;
  document.getElementById("itemcnt").textContent = new Set(rows.map(r => r.item.id)).size;

  let prevItemId = null;
  let groupAlt = false;

  tbody.innerHTML = rows.map(row => {
    const item = row.item;
    const r = row.route;
    const isSame = prevItemId === item.id;
    if(!isSame) groupAlt = !groupAlt;

    const trClass = `${isSame ? "route-row" : "route-row group-start"} ${groupAlt ? "alt" : ""}`;
    const categoryCell = isSame ? `<span class="same">〃</span>` : `<span class="cat-badge ${catClass(item.cat)}">${item.cat}</span>`;
    const nameCell = isSame ? `<span class="same">〃</span>` : nameHtml(item);
    const routeMark = isSame ? `<span class="route-mark">↳</span>` : `<span class="route-mark">●</span>`;

    prevItemId = item.id;

    return `<tr class="${trClass}">
      <td>${categoryCell}</td>
      <td>${nameCell}</td>
      <td><span class="sea-badge">${r.sea}</span></td>
      <td><div class="route-cell">${routeMark}<span>${r.zone}</span></div></td>
      <td class="rank-col">探査 ${r.exp}+</td>
      <td class="rank-col">Rank ${r.rank}+</td>
      <td class="price-cell">${priceHtml(item.id)}</td>
    </tr>`;
  }).join("");
}

/* ---------- イベント ---------- */
document.getElementById("search").addEventListener("input", e => {
  searchText = e.target.value.trim();
  render();
});

document.getElementById("sf").addEventListener("click", e => {
  const b = e.target.closest("[data-sea]");
  if(!b) return;
  filterSea = b.dataset.sea;
  document.querySelectorAll("[data-sea]").forEach(x => x.classList.remove("active"));
  b.classList.add("active");
  render();
});

document.getElementById("cf").addEventListener("click", e => {
  const b = e.target.closest("[data-cat]");
  if(!b) return;
  filterCat = b.dataset.cat;
  document.querySelectorAll("[data-cat]").forEach(x => x.classList.remove("active"));
  b.classList.add("active");
  render();
});

document.querySelector("thead").addEventListener("click", e => {
  const th = e.target.closest("[data-col]");
  if(!th) return;

  const col = th.dataset.col;
  if(sortCol === col){
    sortDir = sortDir === "asc" ? "desc" : "asc";
  }else{
    sortCol = col;
    sortDir = (col === "price") ? "desc" : "asc";
  }

  document.querySelectorAll("th .si").forEach(s => s.textContent = "↕");
  th.querySelector(".si").textContent = sortDir === "asc" ? "↑" : "↓";
  render();
});

/* ---------- 初期化 ---------- */
(async() => {
  try{
    document.getElementById("ov").classList.add("show");
    document.getElementById("ov-text").textContent = "データを読み込み中...";
    await loadData();
    document.getElementById("ov").classList.remove("show");
    render();
    await fetchPrices();
  }catch(e){
    document.getElementById("pstat").textContent = "読み込み失敗: " + e.message;
    document.getElementById("ov").classList.remove("show");
    console.error(e);
  }
})();
</script>

<!-- 公式 Lodestone ツールチップ。必ず家具リンク生成スクリプトの後に読み込む -->
<script src="https://lds-img.finalfantasyxiv.com/pc/global/js/eorzeadb/loader.js?v3"></script>
</body>
</html>
