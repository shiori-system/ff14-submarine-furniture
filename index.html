<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FF14 潜水艦 家具・調度品 逆引きマケボ価格</title>
<style>
  :root {
    --bg:     #fdf8f0;
    --bg2:    #f5ede0;
    --border: #d4c4a8;
    --gold2:  #9c6e14;
    --text:   #2c2010;
    --text2:  #7a6040;
    --green:  #1a6a1a;
    --accent: #c89830;
    --blue:   #14508a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Yu Gothic UI','Meiryo UI','Segoe UI',sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header { background: linear-gradient(135deg,#3a2808,#5a3c10 50%,#3a2808); border-bottom: 3px solid var(--accent); padding: 14px 24px; }
  header h1 { font-size: 20px; color: #f0d890; letter-spacing:.06em; }
  header .sub { color: #c0a860; font-size: 12px; margin-top: 3px; }

  .controls { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 10px 20px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .search-box { background:#fff; border:1px solid var(--border); border-radius:6px; padding:5px 12px; color:var(--text); font-size:14px; width:200px; outline:none; transition:border-color .2s; }
  .search-box:focus { border-color:var(--gold2); }
  .filter-group { display:flex; gap:5px; flex-wrap:wrap; }
  .filter-btn { background:#fff; border:1px solid var(--border); border-radius:4px; padding:4px 10px; color:var(--text2); font-size:12px; cursor:pointer; transition:all .15s; }
  .filter-btn:hover { border-color:var(--gold2); color:var(--gold2); }
  .filter-btn.active { background:var(--gold2); border-color:var(--gold2); color:#fff; font-weight:bold; }
  .server-info { margin-left:auto; display:flex; align-items:center; gap:8px; font-size:12px; color:var(--text2); }
  .server-badge { background:#e8f0fc; border:1px solid #7090d0; color:var(--blue); padding:2px 8px; border-radius:4px; }
  #refresh-btn { background:#fff; border:1px solid var(--gold2); color:var(--gold2); padding:4px 12px; border-radius:4px; cursor:pointer; font-size:12px; }
  #refresh-btn:hover { background:var(--gold2); color:#fff; }
  #refresh-btn:disabled { opacity:.5; cursor:not-allowed; }

  .table-wrap { overflow-x:auto; padding:12px 20px 20px; }
  table { width:100%; border-collapse:collapse; font-size:14px; }
  th { background:#3a2808; color:#f0d890; padding:9px 12px; text-align:left; border-bottom:2px solid var(--accent); white-space:nowrap; cursor:pointer; user-select:none; }
  th:hover { background:#4a3410; }
  th .si { margin-left:4px; color:#c0a060; font-size:11px; }
  tr:nth-child(even) td { background:rgba(200,152,48,.06); }
  tr:hover td { background:rgba(200,152,48,.13); }
  td { padding:8px 12px; border-bottom:1px solid var(--border); vertical-align:middle; }

  /* =============================================
     Lodestone公式ツールチップ スタイル
  ============================================= */
  .tt-wrap { position:relative; display:inline-block; }
  .item-link { color:var(--gold2); font-weight:600; cursor:default; border-bottom:1px dashed var(--accent); }

  .lode-tt {
    display: none;
    position: absolute;
    left: 0;
    top: calc(100% + 8px);
    z-index: 900;
    width: 360px;
    font-family: 'Yu Gothic','Meiryo','MS Gothic',sans-serif;
    background: #192030;
    border: 1px solid #3a4a60;
    box-shadow: 0 8px 32px rgba(0,0,0,.85), 0 0 0 1px #0a1020;
    border-radius: 3px;
    overflow: hidden;
    pointer-events: none;
    color: #c8d0d8;
    font-size: 13px;
    line-height: 1.5;
  }
  .tt-wrap:hover .lode-tt { display: block; }

  /* ヘッダー "THE LODESTONE" */
  .lode-header {
    background: #141c28;
    padding: 6px 10px;
    display: flex;
    align-items: center;
    gap: 0;
    border-bottom: 1px solid #2a3848;
  }
  .lode-h-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, #8a7040);
  }
  .lode-h-line.right { background: linear-gradient(to left, transparent, #8a7040); }
  .lode-h-title {
    color: #c8a050;
    font-size: 11px;
    font-weight: bold;
    letter-spacing: .12em;
    padding: 0 8px;
    white-space: nowrap;
  }
  .lode-h-diamond { color: #d4b060; font-size: 10px; }

  /* アイテムrow */
  .lode-item-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px 8px;
    background: #1e2838;
    border-bottom: 1px solid #2a3848;
  }
  .lode-icon {
    width: 40px; height: 40px;
    border: 1px solid #4a5a70;
    border-radius: 2px;
    flex-shrink: 0;
    background: #0a1020;
    object-fit: contain;
  }
  .lode-icon-ph {
    width: 40px; height: 40px;
    border: 1px solid #2a3848;
    border-radius: 2px;
    flex-shrink: 0;
    background: #0a1020;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }
  .lode-item-meta { flex: 1; min-width: 0; }
  .lode-item-name { color: #f0f4f8; font-size: 15px; font-weight: bold; line-height: 1.3; }
  .lode-item-cat  { color: #7890a8; font-size: 12px; margin-top: 1px; }
  .lode-lv {
    background: #0e1828;
    border: 1px solid #2a3858;
    color: #a0b8d0;
    font-size: 11px;
    padding: 2px 6px;
    border-radius: 2px;
    white-space: nowrap;
    align-self: flex-start;
  }

  /* 説明文 */
  .lode-desc {
    padding: 8px 12px;
    color: #a8b8c8;
    font-size: 12px;
    line-height: 1.7;
    border-bottom: 1px solid #2a3848;
    min-height: 28px;
  }
  .lode-desc.loading { color: #50607a; font-style: italic; }

  /* DATA セクション */
  .lode-data-section {
    padding: 6px 0 0;
  }
  .lode-data-header {
    color: #c07830;
    font-size: 11px;
    font-weight: bold;
    letter-spacing: .1em;
    padding: 4px 12px 4px;
    border-bottom: 1px solid #2a3848;
  }
  .lode-route-group { padding: 6px 12px 2px; }
  .lode-route-label {
    color: #8098b8;
    font-size: 11px;
    font-weight: bold;
    margin-bottom: 3px;
  }
  .lode-route-row {
    display: flex;
    align-items: baseline;
    gap: 6px;
    padding: 1px 8px;
    font-size: 12px;
    line-height: 1.6;
  }
  .lode-r-sea  { color: #7090b8; font-weight: 600; min-width: 68px; flex-shrink: 0; }
  .lode-r-zone { color: #b8c8d8; flex: 1; }
  .lode-r-exp  { color: #607080; font-size: 11px; flex-shrink: 0; }

  /* フッター */
  .lode-footer {
    padding: 6px 12px;
    background: #141c28;
    border-top: 1px solid #2a3848;
    font-size: 11px;
    color: #506070;
    margin-top: 4px;
  }
  .lode-footer-link { color: #4878a8; text-decoration: none; }

  /* =================== */
  .cat-badge { display:inline-block; padding:2px 7px; border-radius:3px; font-size:11px; white-space:nowrap; }
  .c調度品   { background:#e8f5e8; color:#1a6a1a; border:1px solid #a8d8a8; }
  .c卓上     { background:#e4f4f8; color:#0c6080; border:1px solid #90d0e0; }
  .c壁掛     { background:#f4e8f8; color:#7020a0; border:1px solid #d090e0; }
  .c庭具     { background:#fdf0d8; color:#804010; border:1px solid #e0b870; }
  .sea-badge { display:inline-block; padding:2px 6px; border-radius:3px; font-size:11px; background:#f0e8d8; color:var(--text2); border:1px solid #d0b890; margin:1px; }
  .rank-col  { color:var(--text2); font-size:12px; }
  .price-cell { text-align:right; min-width:120px; }
  .p-load { color:#a09080; font-size:12px; }
  .p-val  { color:var(--green); font-weight:bold; font-size:15px; }
  .p-none { color:#a09080; font-size:12px; }
  .p-g    { color:#808060; font-size:11px; margin-left:1px; }

  .status-bar { padding:5px 20px; font-size:12px; color:var(--text2); border-top:1px solid var(--border); display:flex; gap:16px; }
  .no-results { text-align:center; padding:40px; color:var(--text2); font-size:14px; }
  #ov { display:none; position:fixed; inset:0; background:rgba(30,20,5,.55); z-index:999; align-items:center; justify-content:center; flex-direction:column; gap:10px; }
  #ov.show { display:flex; }
  .spinner { width:40px; height:40px; border:3px solid #d0b870; border-top-color:transparent; border-radius:50%; animation:spin .8s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .ov-text { color:#f0d060; font-size:14px; }
</style>
</head>

// ============================================================
// 状態
// ============================================================
let sortCol="price", sortDir="desc", filterSea="all", filterCat="all", searchText="";
const prices  = {};  // id → minPrice(number) | null
const descs   = {};  // id → string | null  (lazy XIVAPI)
const pending = new Set();

// ============================================================
// Universalis バッチ取得（IDハードコード済、一発で取れる）
// ============================================================
async function fetchPrices() {
  const btn = document.getElementById("refresh-btn");
  btn.disabled = true; btn.textContent = "取得中...";
  document.getElementById("ov").classList.add("show");
  document.getElementById("pstat").textContent = "取得中...";

  const ids = ITEMS.map(i=>i.id).join(",");
  try {
    const res = await fetch(`https://universalis.app/api/v2/Alexander/${ids}?listings=1&entries=0`);
    if (!res.ok) throw new Error("HTTP "+res.status);
    const data = await res.json();
    for (const [sid,info] of Object.entries(data.items ?? {})) {
      prices[+sid] = (info.minPrice > 0) ? info.minPrice : null;
    }
    const got = Object.values(prices).filter(v=>v!==null).length;
    document.getElementById("upd").textContent = `更新: ${new Date().toLocaleTimeString("ja-JP")}`;
    document.getElementById("pstat").textContent = `取得完了 — 出品あり ${got} 件`;
  } catch(e) {
    document.getElementById("pstat").textContent = "エラー: " + e.message;
    console.error(e);
  }
  document.getElementById("ov").classList.remove("show");
  btn.disabled=false; btn.textContent="🔄 価格更新";
  render();
}

// ============================================================
// XIVAPI 説明文オンデマンド取得
// ============================================================
async function loadDesc(item) {
  if (pending.has(item.id) || descs[item.id]!==undefined) return;
  pending.add(item.id);
  try {
    const res = await fetch(`https://xivapi.com/item/${item.id}?columns=Description_ja`);
    if (!res.ok) { descs[item.id]=null; return; }
    const d = await res.json();
    descs[item.id] = (d.Description_ja||"").replace(/<[^>]+>/g,"").trim() || null;
  } catch { descs[item.id]=null; }
  // 表示中なら更新
  const el = document.querySelector(`.lode-desc[data-id="${item.id}"]`);
  if (el) {
    el.classList.remove("loading");
    el.textContent = descs[item.id] || "";
  }
}

// ============================================================
// ツールチップ HTML生成
// ============================================================
function makeTooltip(item) {
  const iconHtml = `<img class="lode-icon" src="${icoUrl(item.ico)}" alt="" onerror="this.outerHTML='<div class=\\'lode-icon-ph\\'>🪑</div>'">`;
  const descText = descs[item.id];
  const descHtml = (descText !== undefined)
    ? `<div class="lode-desc" data-id="${item.id}">${descText||""}</div>`
    : `<div class="lode-desc loading" data-id="${item.id}">説明文を読み込み中...</div>`;
  const routeRows = item.routes.map(r =>
    `<div class="lode-route-row">
      <span class="lode-r-sea">${r.sea}</span>
      <span class="lode-r-zone">${r.zone}</span>
      <span class="lode-r-exp">探査${r.exp}+</span>
    </div>`).join("");
  return `
    <div class="lode-header">
      <div class="lode-h-line"></div>
      <div class="lode-h-title">THE LODEST<span class="lode-h-diamond">◆</span>NE</div>
      <div class="lode-h-line right"></div>
    </div>
    <div class="lode-item-row">
      ${iconHtml}
      <div class="lode-item-meta">
        <div class="lode-item-name">${item.name}</div>
        <div class="lode-item-cat">${item.cat}</div>
      </div>
      <div class="lode-lv">Lv 1</div>
    </div>
    ${descHtml}
    <div class="lode-data-section">
      <div class="lode-data-header">DATA</div>
      <div class="lode-route-group">
        <div class="lode-route-label">⚓ 入手できる潜水艦航路</div>
        ${routeRows}
      </div>
    </div>
    <div class="lode-footer">
      Powered by <a class="lode-footer-link">FINAL FANTASY XIV, The Lodestone</a><br>
      © SQUARE ENIX
    </div>`;
}

// ============================================================
// 描画
// ============================================================
function catClass(c) {
  if (c==="卓上調度品") return "c卓上";
  if (c.includes("壁掛")) return "c壁掛";
  if (c==="庭具") return "c庭具";
  return "c調度品";
}
function priceHtml(id) {
  const p = prices[id];
  if (p===undefined) return `<span class="p-load">読込中...</span>`;
  if (p===null)      return `<span class="p-none">出品なし</span>`;
  return `<span class="p-val">${p.toLocaleString("ja-JP")}</span><span class="p-g">G</span>`;
}
function getFiltered() {
  return ITEMS.filter(item => {
    if (filterSea!=="all" && !item.routes.some(r=>r.sea===filterSea)) return false;
    if (filterCat!=="all" && item.cat!==filterCat) return false;
    if (searchText && !item.name.includes(searchText)) return false;
    return true;
  }).sort((a,b) => {
    let va,vb;
    if (sortCol==="price") { va=prices[a.id]??-1; vb=prices[b.id]??-1; }
    else if (sortCol==="name") { va=a.name; vb=b.name; }
    else if (sortCol==="category") { va=a.cat; vb=b.cat; }
    else if (sortCol==="minRank") {
      va=Math.min(...a.routes.map(r=>r.rank));
      vb=Math.min(...b.routes.map(r=>r.rank));
    } else return 0;
    return (va<vb?-1:va>vb?1:0) * (sortDir==="asc"?1:-1);
  });
}
function render() {
  const items = getFiltered();
  const tbody = document.getElementById("tbody");
  document.getElementById("nores").style.display = items.length?"none":"";
  document.getElementById("cnt").textContent = items.length;
  tbody.innerHTML = items.map(item => {
    const mr = Math.min(...item.routes.map(r=>r.rank));
    const seas = [...new Set(item.routes.map(r=>r.sea))].map(s=>`<span class="sea-badge">${s}</span>`).join("");
    return `<tr>
      <td>
        <div class="tt-wrap">
          <span class="item-link">${item.name}</span>
          <div class="lode-tt">${makeTooltip(item)}</div>
        </div>
      </td>
      <td><span class="cat-badge ${catClass(item.cat)}">${item.cat}</span></td>
      <td>${seas}</td>
      <td class="rank-col">Rank ${mr}+</td>
      <td class="price-cell">${priceHtml(item.id)}</td>
    </tr>`;
  }).join("");

  // ホバー時にXIVAPI説明文をオンデマンド取得
  tbody.querySelectorAll(".tt-wrap").forEach((wrap,i) => {
    const item = items[i];
    wrap.addEventListener("mouseenter", () => loadDesc(item), {once:true});
  });
}

// ============================================================
// イベント
// ============================================================
document.getElementById("search").addEventListener("input",e=>{searchText=e.target.value.trim();render();});
document.getElementById("sf").addEventListener("click",e=>{
  const b=e.target.closest("[data-sea]");if(!b)return;
  filterSea=b.dataset.sea;
  document.querySelectorAll("[data-sea]").forEach(x=>x.classList.remove("active"));
  b.classList.add("active");render();
});
document.getElementById("cf").addEventListener("click",e=>{
  const b=e.target.closest("[data-cat]");if(!b)return;
  filterCat=b.dataset.cat;
  document.querySelectorAll("[data-cat]").forEach(x=>x.classList.remove("active"));
  b.classList.add("active");render();
});
document.querySelector("thead").addEventListener("click",e=>{
  const th=e.target.closest("[data-col]");if(!th)return;
  const col=th.dataset.col;
  if(sortCol===col) sortDir=sortDir==="asc"?"desc":"asc";
  else{sortCol=col;sortDir=col==="price"?"desc":"asc";}
  document.querySelectorAll("th .si").forEach(s=>s.textContent="↕");
  th.querySelector(".si").textContent=sortDir==="asc"?"↑":"↓";
  render();
});

// ============================================================
// 初期化
// ============================================================
render();
fetchPrices();
</script>
</body>
</html>
